<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Coffee</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
</head>
<body>
<div class="background">
    <div class="bg active" style="background-image:url('https://raw.githubusercontent.com/joannanorton/melodycoffee/refs/heads/main/img/ganganism.jpg')"></div>
    <div class="bg" style="background-image:url('https://raw.githubusercontent.com/joannanorton/melodycoffee/refs/heads/main/img/kebonup.jpg')"></div>
    <div class="bg" style="background-image:url('https://raw.githubusercontent.com/joannanorton/melodycoffee/refs/heads/main/img/fungiup.jpg')"></div>
    <div class="bg" style="background-image:url('img/greenbean.jpg')"></div>
</div>
<header>
<div class="logo">MELODY COFFEE</div>
<nav>
    <a href="#">About</a>
    <a href="#">Mission</a>
    <a href="#">Process</a>
    <a href="#">Order</a>
</nav>
</header>
<div class="story">
    <h1 id="headline"></h1>
    <p id="paragraph"></p>
    <button id="read-more-btn" style="display: none;">Read More</button>
</div>
<div class="panels">
    <section class="panel"></section>
    <section class="panel"></section>
    <section class="panel"></section>
</div>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html,body{
        width: 100%;
        height: 100%;
        overflow-x: hidden;
    }
    body{
        background: #000;
        color: #fff;
        font-family: Arialm Arial, Helvetica, sans-serif;
    }
    .background{
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        z-index: -2;
    }
    .bg{
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transform: scale(1.08);
    }
    .bg.active{
        opacity: 1;
    }
    .background::after{
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.30);
    }

    header{
        position: fixed;
        top: 0;
        left: 0;
        width:100%;
        padding:40px 60px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        z-index:100;
    }
    .logo{
        font-size:18px;
        letter-spacing:5px;
        text-transform:uppercase;
        font-weight:300;
    }
    nav{
        display:flex;
        gap:40px;
    }
    nav a{
        color:white;
        text-decoration:none;
        opacity:.6;
        transition:.4s;
        font-size:15px;
    }
    nav a:hover{
        opacity:1;
    }
    .story{
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:min(760px,85vw);
        text-align:center;
        z-index:20;
    }
    .story h1{
        font-size:clamp(44px,6vw,84px);
        font-weight:200;
        line-height:1.05;
        margin-bottom:32px;
        letter-spacing:-2px;
    }
    .story p{
        width:80%;
        margin:auto;
        font-size:20px;
        line-height:1.8;
        opacity:.82;
    }
    #read-more-btn {
        background: #333;
        color: #fff;
        border: none;
        padding: 8px 16px;
        margin-top: 12px;
        cursor: pointer;
        font-size: 14px;
        border-radius: 4px;
        transition: background 0.2s ease;
    }
    #read-more-btn:hover {
        background: #555;
    }
    .panels{
        position:relative;
        padding-bottom: 20vh;
    }
    .panel{
        width:100%;
        height:100svh;
    }
    @media(max-width:900px){
        header{
            padding:30px;
        }
        nav{
            gap:20px;
        }
    .story h1{
        font-size:48px;
    }
    .story p{
        width:100%;
        font-size:18px;
    }
}
@media(max-width:700px){
    header{
        flex-direction:column;
        gap:20px;
    }
    nav{
        flex-wrap:wrap;
        justify-content:center;
    }
    .story{
        width:90%;
    }
    .story h1{
        font-size:38px;
    }
    .story p{
        font-size:16px;
        line-height:1.6;
    }
}
</style>
<script>
    gsap.registerPlugin(ScrollTrigger);

    const scenes = [
        {
            title:"Melody Coffee",
            text:"kami percaya kopi yang baik berasal dari alam yang baik dan terjaga",
            fullText:"kopi mah kudu anu berem pokonamah di petik na",
        },
        {
            title:"kami bukan hanya menanam kopi",
            text:"Melalui agroforestry kami mengembalikan kembali fungsi hutan yaitu sebagai rumah bagi semua ecosystem yang membutuhkanya",
            fullText:"tah lamun kopi ulah kapanasan teuing, emang tereh berem ka asak na tapi teu ngeunah rasa na",
        },
        {
            title:"fungi",
            text:"fungi alami yang berasal dari hutan memberikan sumber nutrisi yang sangat baik bagi kopi",
            fullText:"tah si jamur teh ngabantu pisan penyerapan nutrisi ka si taneh na ameh kopi na ngeungah",
        },
    ];
    
    const readMoreBtn = document.getElementById("read-more-btn");
    let currentFullText = "";
    const backgrounds = document.querySelectorAll(".bg");
    const headline = document.getElementById("headline");
    const paragraph = document.getElementById("paragraph");
    const panels = document.querySelectorAll(".panel");
    
    gsap.set(backgrounds,{
        opacity:0,
        scale:1.08
    });
    gsap.set(backgrounds[0],{
        opacity:1
    });

    panels.forEach((panel,index)=>{
        ScrollTrigger.create({
            trigger:panel,
            start:"top 80%",
            end:"bottom 20%",
            onEnter:()=>changeScene(index),
            onEnterBack:()=>changeScene(index)
        });
    });

    function changeScene(index){
        backgrounds.forEach((bg,i)=>{
            gsap.to(bg,{
                opacity:i===index?1:0,
                scale:i===index?1:1.08,
                duration:1.5,
                ease:"power2.out"
            });
        });
        let tl=gsap.timeline();
        tl.to([headline,paragraph, readMoreBtn],{
            opacity:0,
            y:40,
            duration:.35,
            ease:"power2.out"
        });
        tl.call(()=>{
            // set the short text
            headline.innerHTML=scenes[index].title;
            paragraph.innerHTML=scenes[index].text;
            // save the full text for the click event
            currentFullText = scenes[index].fullText || "";
            if (currentFullText) {
                readMoreBtn.style.display = "inline-block";
                readMoreBtn.innerText = "Read More";
            } else {
                readMoreBtn.style.display = "none";
            }
        });

        tl.fromTo(
            headline,
            {
                opacity:0,
                y:50
            },
            {
                opacity:1,
                y:0,
                duration:.8,
                ease:"power3.out"
            }
        );
        tl.fromTo(
            paragraph,
            {
                opacity:0,
                y:30
            },
            {
                opacity:.82,
                y:0,
                duration:.8,
                ease:"power3.out"
            },
            "-=.45"
        );
        tl.fromTo(
            readMoreBtn,
            {
                opacity: 0,
                y: 20,
            },
            { 
                opacity: 1,
                y: 0,
                duration: .5,
                ease: "power3.out"
            },
                "-=.6"
        );
    }

    readMoreBtn.addEventListener("click", () => {
        // Find the active scene object matching the active full text
        const activeScene = scenes.find(s => s.fullText === currentFullText);
        
        if (!activeScene) return;

        // Check if the paragraph text is currently matching the base text
        if (paragraph.innerHTML === activeScene.text) {
            // It's short, so append full text
            paragraph.innerHTML = activeScene.text + " " + currentFullText;
            readMoreBtn.innerHTML = "Read Less";
            gsap.fromTo(paragraph, { opacity: 0.5 }, { opacity: 0.82, duration: 0.4 });
        } else {
            // It's expanded, so restore short text
            paragraph.innerHTML = activeScene.text;
            readMoreBtn.innerHTML = "Read More";
        }
    });

    backgrounds.forEach((bg)=>{
        gsap.to(bg,{
            scale:1.15,
            duration:8,
            repeat:-1,
            yoyo:true,
            ease:"none"
        });
    });
</script>
</body>
</html>
